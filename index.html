<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      fetch("./current.json", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) {
            throw new Error("Redirect config unavailable");
          }

          return response.json();
        })
        .then((data) => {
          if (typeof data.url !== "string" || !/^https?:\/\//.test(data.url)) {
            throw new Error("Redirect config is invalid");
          }

          window.location.replace(data.url);
        })
        .catch(() => {
          document.addEventListener("DOMContentLoaded", () => {
            document.body.textContent = "Redirect unavailable.";
          });
        });
    </script>
  </head>
  <body>
    <p>Redirecting you...</p>
  </body>
</html>
