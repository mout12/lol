<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirect Admin</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #64748b;
        --line: #d8dee8;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --accent-soft: #ecfdf8;
        --danger: #b42318;
        --danger-soft: #fff1f0;
        --ok: #067647;
        --shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 620px);
        margin: 0 auto;
        padding: 28px 18px 40px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .app-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: var(--shadow);
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }

      label {
        font-size: 13px;
        font-weight: 650;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 11px 12px;
        font: inherit;
        color: var(--text);
        background: #ffffff;
      }

      input:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(15, 118, 110, 0.16);
      }

      button,
      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 46px;
        border: 0;
        border-radius: 7px;
        padding: 11px 14px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        color: #ffffff;
        background: var(--accent);
        cursor: pointer;
      }

      button:disabled,
      .button-link.disabled {
        cursor: not-allowed;
        opacity: 0.65;
        pointer-events: none;
      }

      button.secondary,
      .button-link.secondary {
        color: var(--text);
        background: #e8edf2;
      }

      button:not(:disabled):hover,
      .button-link:not(.disabled):hover {
        background: var(--accent-dark);
      }

      button.secondary:not(:disabled):hover,
      .button-link.secondary:not(.disabled):hover {
        background: #dbe3eb;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .status {
        min-height: 22px;
        margin-top: 14px;
        font-size: 14px;
        line-height: 1.45;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .status.ok {
        color: var(--ok);
      }

      .session {
        display: grid;
        gap: 14px;
      }

      .session-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #f8fafc;
      }

      .session-row strong,
      .session-row span {
        overflow-wrap: anywhere;
      }

      .current-url {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #f8fafc;
      }

      .current-url strong,
      .history-title {
        font-size: 13px;
      }

      .current-url .url-text {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
        overflow-wrap: anywhere;
      }

      .current-actions,
      .form-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .target-preview {
        min-height: 20px;
        margin: -4px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
        overflow-wrap: anywhere;
      }

      .target-preview.ok {
        color: var(--ok);
      }

      .target-preview.error {
        color: var(--danger);
      }

      .history {
        display: grid;
        gap: 8px;
      }

      .history-title {
        margin-top: 4px;
        font-weight: 650;
      }

      .history-list {
        display: grid;
        gap: 8px;
      }

      .history-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 42px;
        gap: 8px;
        align-items: stretch;
      }

      .history-row.confirming-delete {
        grid-template-columns: minmax(0, 1fr) 76px;
      }

      .history-empty {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .history-item {
        width: 100%;
        min-height: 0;
        display: block;
        padding: 10px 11px;
        border: 1px solid var(--line);
        color: var(--text);
        background: #ffffff;
        text-align: left;
        font-weight: 600;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .history-item.url-only {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-item.active {
        border-color: var(--accent);
        color: var(--accent-dark);
        background: var(--accent-soft);
      }

      .history-item:not(:disabled):hover {
        background: #f8fafc;
      }

      .delete-history {
        width: 42px;
        min-height: 0;
        padding: 0;
        color: var(--danger);
        background: var(--danger-soft);
        font-size: 18px;
        line-height: 1;
      }

      .delete-history.confirming {
        width: auto;
        padding: 0 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .delete-history:not(:disabled):hover {
        color: #ffffff;
        background: var(--danger);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 480px) {
        main {
          padding: 22px 14px 32px;
        }

        .app-header {
          display: grid;
          gap: 4px;
        }

        .panel {
          padding: 16px;
        }

        .current-actions,
        .form-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="app-header">
        <div>
          <h1>Redirect Admin</h1>
          <p class="subtitle">Manage the active URL for lol.buck.mx.</p>
        </div>
      </header>

      <section id="loginPanel" class="panel">
        <form id="loginForm" class="stack">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="username" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>

          <button id="loginButton" type="submit">Sign in</button>
        </form>
        <p id="loginStatus" class="status" aria-live="polite"></p>
      </section>

      <section id="newPasswordPanel" class="panel hidden">
        <form id="newPasswordForm" class="stack">
          <div class="field">
            <label for="newPassword">New password</label>
            <input
              id="newPassword"
              name="newPassword"
              type="password"
              autocomplete="new-password"
              minlength="12"
              required
            />
          </div>

          <button id="newPasswordButton" type="submit">Set password</button>
        </form>
        <p id="newPasswordStatus" class="status" aria-live="polite"></p>
      </section>

      <section id="sessionPanel" class="panel session hidden">
        <div class="session-row">
          <strong>Signed in</strong>
          <span id="signedInAs"></span>
        </div>
        <div class="current-url">
          <strong>Current redirect</strong>
          <span id="currentUrl" class="url-text">Loading...</span>
          <div class="current-actions">
            <a id="openCurrentButton" class="button-link secondary disabled" href="#" target="_blank" rel="noopener">Open current</a>
            <button id="copyCurrentButton" class="secondary" type="button" disabled>Copy URL</button>
          </div>
        </div>
        <form id="redirectForm" class="stack">
          <div class="field">
            <label for="redirectUrl">Redirect URL</label>
            <input
              id="redirectUrl"
              name="redirectUrl"
              type="url"
              inputmode="url"
              autocomplete="url"
              placeholder="https://example.com"
              required
            />
          </div>
          <p id="targetPreview" class="target-preview" aria-live="polite"></p>
          <div class="field">
            <label for="description">Description</label>
            <input
              id="description"
              name="description"
              type="text"
              autocomplete="off"
              placeholder="Optional label for history"
            />
          </div>
          <div class="form-actions">
            <button id="redirectButton" type="submit">Set redirect</button>
            <a id="testUrlButton" class="button-link secondary disabled" href="#" target="_blank" rel="noopener">Open test</a>
          </div>
        </form>
        <div class="history">
          <div class="history-title">Prior URLs</div>
          <div id="historyList" class="history-list">
            <p class="history-empty">Loading...</p>
          </div>
        </div>
        <button id="logoutButton" class="secondary" type="button">Sign out</button>
        <p id="sessionStatus" class="status ok" aria-live="polite"></p>
      </section>
    </main>

    <script>
      const canonicalAdminOrigin = "https://admin.lol.buck.mx";
      if (
        window.location.protocol.startsWith("http") &&
        window.location.origin !== canonicalAdminOrigin
      ) {
        window.location.replace(`${canonicalAdminOrigin}${window.location.pathname}`);
      }

      const cognito = {
        region: "us-east-2",
        clientId: "mjj7ggl6ti48cu6s8qutdek1k",
        endpoint: "https://cognito-idp.us-east-2.amazonaws.com/",
      };

      const adminApi = {
        currentEndpoint: "https://gil40t7dfi.execute-api.us-east-2.amazonaws.com/current",
        currentJson: "./current.json",
        historyJson: "./history.json",
      };

      const state = {
        challengeSession: null,
        challengeUsername: null,
        displayEmail: null,
      };

      const elements = {
        loginPanel: document.querySelector("#loginPanel"),
        loginForm: document.querySelector("#loginForm"),
        loginButton: document.querySelector("#loginButton"),
        loginStatus: document.querySelector("#loginStatus"),
        newPasswordPanel: document.querySelector("#newPasswordPanel"),
        newPasswordForm: document.querySelector("#newPasswordForm"),
        newPasswordButton: document.querySelector("#newPasswordButton"),
        newPasswordStatus: document.querySelector("#newPasswordStatus"),
        sessionPanel: document.querySelector("#sessionPanel"),
        signedInAs: document.querySelector("#signedInAs"),
        sessionStatus: document.querySelector("#sessionStatus"),
        currentUrl: document.querySelector("#currentUrl"),
        openCurrentButton: document.querySelector("#openCurrentButton"),
        copyCurrentButton: document.querySelector("#copyCurrentButton"),
        redirectForm: document.querySelector("#redirectForm"),
        redirectUrlInput: document.querySelector("#redirectUrl"),
        redirectButton: document.querySelector("#redirectButton"),
        targetPreview: document.querySelector("#targetPreview"),
        testUrlButton: document.querySelector("#testUrlButton"),
        historyList: document.querySelector("#historyList"),
        logoutButton: document.querySelector("#logoutButton"),
      };

      function show(panelName) {
        elements.loginPanel.classList.toggle("hidden", panelName !== "login");
        elements.newPasswordPanel.classList.toggle("hidden", panelName !== "newPassword");
        elements.sessionPanel.classList.toggle("hidden", panelName !== "session");
      }

      function setStatus(element, message, type) {
        element.textContent = message || "";
        element.classList.toggle("error", type === "error");
        element.classList.toggle("ok", type === "ok");
      }

      async function cognitoRequest(target, payload) {
        const response = await fetch(cognito.endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-amz-json-1.1",
            "X-Amz-Target": `AWSCognitoIdentityProviderService.${target}`,
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const message = data.message || data.__type || "Cognito request failed";
          throw new Error(message);
        }

        return data;
      }

      function saveSession(authResult, email) {
        const expiresAt = Date.now() + authResult.ExpiresIn * 1000;
        sessionStorage.setItem("adminEmail", email);
        sessionStorage.setItem("idToken", authResult.IdToken);
        sessionStorage.setItem("accessToken", authResult.AccessToken);
        sessionStorage.setItem("expiresAt", String(expiresAt));
      }

      function clearSession() {
        sessionStorage.removeItem("adminEmail");
        sessionStorage.removeItem("idToken");
        sessionStorage.removeItem("accessToken");
        sessionStorage.removeItem("expiresAt");
      }

      function validateRedirectUrl(value) {
        let parsed;
        try {
          parsed = new URL(value);
        } catch {
          throw new Error("Enter a valid URL.");
        }

        if (!["http:", "https:"].includes(parsed.protocol)) {
          throw new Error("URL must start with http:// or https://.");
        }

        return parsed.href;
      }

      function setLinkState(link, url) {
        if (url) {
          link.href = url;
          link.classList.remove("disabled");
          link.removeAttribute("aria-disabled");
          return;
        }

        link.href = "#";
        link.classList.add("disabled");
        link.setAttribute("aria-disabled", "true");
      }

      async function fetchJson(url, fallback) {
        const response = await fetch(url, { cache: "no-store" });
        if (response.status === 404) {
          return fallback;
        }

        if (!response.ok) {
          throw new Error("Could not load redirect state.");
        }

        return response.json();
      }

      function renderCurrentUrl(url) {
        elements.currentUrl.textContent = url || "No active redirect found.";
        setLinkState(elements.openCurrentButton, url);
        elements.copyCurrentButton.disabled = !url;
      }

      function renderHistory(urls, activeUrl) {
        elements.historyList.textContent = "";

        if (!urls.length) {
          const empty = document.createElement("p");
          empty.className = "history-empty";
          empty.textContent = "No prior URLs yet.";
          elements.historyList.append(empty);
          return;
        }

        for (const item of urls) {
          if (!item || typeof item.url !== "string") {
            continue;
          }

          const row = document.createElement("div");
          const button = document.createElement("button");
          const deleteButton = document.createElement("button");
          const description =
            typeof item.description === "string" ? item.description.trim() : "";
          row.className = "history-row";
          button.type = "button";
          button.className = "history-item";
          button.textContent = description || item.url;
          button.title = item.url;
          button.dataset.url = item.url;
          deleteButton.type = "button";
          deleteButton.className = "delete-history";
          deleteButton.textContent = "X";
          deleteButton.dataset.deleteUrl = item.url;
          deleteButton.setAttribute("aria-label", "Delete history item");

          if (!description) {
            button.classList.add("url-only");
          }

          if (item.url === activeUrl) {
            button.classList.add("active");
          }

          row.append(button, deleteButton);
          elements.historyList.append(row);
        }
      }

      async function loadRedirectState() {
        try {
          const [current, history] = await Promise.all([
            fetchJson(adminApi.currentJson, {}),
            fetchJson(adminApi.historyJson, { urls: [] }),
          ]);
          const activeUrl = typeof current.url === "string" ? current.url : "";
          const urls = Array.isArray(history.urls) ? history.urls : [];

          renderCurrentUrl(activeUrl);
          renderHistory(urls, activeUrl);
        } catch (error) {
          setStatus(elements.sessionStatus, error.message, "error");
        }
      }

      function applyRedirectUpdate(data) {
        const activeUrl = typeof data.url === "string" ? data.url : "";
        const urls = Array.isArray(data.history) ? data.history : [];
        renderCurrentUrl(activeUrl);
        renderHistory(urls, activeUrl);
      }

      function renderTargetPreview() {
        const value = elements.redirectUrlInput.value.trim();
        elements.targetPreview.classList.remove("ok", "error");

        if (!value) {
          elements.targetPreview.textContent = "";
          setLinkState(elements.testUrlButton, "");
          return;
        }

        try {
          const url = validateRedirectUrl(value);
          elements.targetPreview.textContent = `Target: ${new URL(url).host}`;
          elements.targetPreview.classList.add("ok");
          setLinkState(elements.testUrlButton, url);
        } catch (error) {
          elements.targetPreview.textContent = error.message;
          elements.targetPreview.classList.add("error");
          setLinkState(elements.testUrlButton, "");
        }
      }

      async function setRedirectUrl(url, description) {
        const idToken = sessionStorage.getItem("idToken");
        if (!idToken) {
          throw new Error("Session expired. Sign in again.");
        }

        const payload = { url };
        if (typeof description === "string") {
          payload.description = description;
        }

        const response = await fetch(adminApi.currentEndpoint, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${idToken}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        }).catch(() => {
          throw new Error(
            "Could not reach the admin API. Open https://admin.lol.buck.mx and try again."
          );
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.error) {
          throw new Error(data.error || data.message || "Could not update redirect.");
        }

        return data;
      }

      async function deleteHistoryUrl(url) {
        const idToken = sessionStorage.getItem("idToken");
        if (!idToken) {
          throw new Error("Session expired. Sign in again.");
        }

        const response = await fetch(adminApi.currentEndpoint, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${idToken}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ action: "delete", url }),
        }).catch(() => {
          throw new Error(
            "Could not reach the admin API. Open https://admin.lol.buck.mx and try again."
          );
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.error) {
          throw new Error(data.error || data.message || "Could not delete history item.");
        }

        return data;
      }

      function renderExistingSession() {
        const email = sessionStorage.getItem("adminEmail");
        const expiresAt = Number(sessionStorage.getItem("expiresAt") || 0);

        if (!email || !expiresAt || expiresAt <= Date.now()) {
          clearSession();
          show("login");
          return;
        }

        elements.signedInAs.textContent = email;
        setStatus(elements.sessionStatus, "Ready.", "ok");
        show("session");
        loadRedirectState();
      }

      elements.loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        elements.loginButton.disabled = true;
        setStatus(elements.loginStatus, "Signing in...");

        const form = new FormData(elements.loginForm);
        const email = String(form.get("email") || "").trim();
        const password = String(form.get("password") || "");

        try {
          const result = await cognitoRequest("InitiateAuth", {
            AuthFlow: "USER_PASSWORD_AUTH",
            ClientId: cognito.clientId,
            AuthParameters: {
              USERNAME: email,
              PASSWORD: password,
            },
          });

          if (result.ChallengeName === "NEW_PASSWORD_REQUIRED") {
            state.challengeSession = result.Session;
            state.challengeUsername = result.ChallengeParameters.USER_ID_FOR_SRP || email;
            state.displayEmail = email;
            setStatus(elements.loginStatus, "");
            setStatus(elements.newPasswordStatus, "Set a permanent password to finish login.");
            show("newPassword");
            return;
          }

          saveSession(result.AuthenticationResult, email);
          renderExistingSession();
        } catch (error) {
          setStatus(elements.loginStatus, error.message, "error");
        } finally {
          elements.loginButton.disabled = false;
        }
      });

      elements.newPasswordForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        elements.newPasswordButton.disabled = true;
        setStatus(elements.newPasswordStatus, "Setting password...");

        const form = new FormData(elements.newPasswordForm);
        const newPassword = String(form.get("newPassword") || "");

        try {
          const result = await cognitoRequest("RespondToAuthChallenge", {
            ClientId: cognito.clientId,
            ChallengeName: "NEW_PASSWORD_REQUIRED",
            Session: state.challengeSession,
            ChallengeResponses: {
              USERNAME: state.challengeUsername,
              NEW_PASSWORD: newPassword,
            },
          });

          saveSession(result.AuthenticationResult, state.displayEmail);
          renderExistingSession();
        } catch (error) {
          setStatus(elements.newPasswordStatus, error.message, "error");
        } finally {
          elements.newPasswordButton.disabled = false;
        }
      });

      elements.redirectForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        elements.redirectButton.disabled = true;
        setStatus(elements.sessionStatus, "Updating redirect...");

        const form = new FormData(elements.redirectForm);

        try {
          const url = validateRedirectUrl(String(form.get("redirectUrl") || "").trim());
          const description = String(form.get("description") || "").trim();
          const data = await setRedirectUrl(url, description);
          applyRedirectUpdate(data);
          elements.redirectForm.reset();
          renderTargetPreview();
          setStatus(elements.sessionStatus, "Redirect updated.", "ok");
        } catch (error) {
          setStatus(elements.sessionStatus, error.message, "error");
        } finally {
          elements.redirectButton.disabled = false;
        }
      });

      elements.historyList.addEventListener("click", async (event) => {
        const deleteButton = event.target.closest("button[data-delete-url]");
        if (deleteButton) {
          if (deleteButton.dataset.confirming !== "true") {
            deleteButton.dataset.confirming = "true";
            deleteButton.closest(".history-row").classList.add("confirming-delete");
            deleteButton.classList.add("confirming");
            deleteButton.textContent = "Delete?";
            setStatus(elements.sessionStatus, "Tap Delete? again to remove this history item.");
            window.setTimeout(() => {
              if (deleteButton.dataset.confirming === "true") {
                deleteButton.dataset.confirming = "";
                deleteButton.closest(".history-row").classList.remove("confirming-delete");
                deleteButton.classList.remove("confirming");
                deleteButton.textContent = "X";
              }
            }, 3200);
            return;
          }

          deleteButton.disabled = true;
          setStatus(elements.sessionStatus, "Deleting history item...");

          try {
            const data = await deleteHistoryUrl(deleteButton.dataset.deleteUrl);
            const activeUrl = elements.currentUrl.textContent.trim();
            renderHistory(Array.isArray(data.history) ? data.history : [], activeUrl);
            setStatus(elements.sessionStatus, "History item deleted.", "ok");
          } catch (error) {
            setStatus(elements.sessionStatus, error.message, "error");
          } finally {
            deleteButton.dataset.confirming = "";
            deleteButton.closest(".history-row")?.classList.remove("confirming-delete");
            deleteButton.classList.remove("confirming");
            deleteButton.textContent = "X";
            deleteButton.disabled = false;
          }
          return;
        }

        const button = event.target.closest("button[data-url]");
        if (!button) {
          return;
        }

        elements.redirectButton.disabled = true;
        button.disabled = true;
        setStatus(elements.sessionStatus, "Updating redirect...");

        try {
          const data = await setRedirectUrl(button.dataset.url);
          applyRedirectUpdate(data);
          elements.redirectForm.reset();
          renderTargetPreview();
          setStatus(elements.sessionStatus, "Redirect updated.", "ok");
        } catch (error) {
          setStatus(elements.sessionStatus, error.message, "error");
        } finally {
          button.disabled = false;
          elements.redirectButton.disabled = false;
        }
      });

      elements.logoutButton.addEventListener("click", () => {
        clearSession();
        elements.loginForm.reset();
        elements.newPasswordForm.reset();
        elements.redirectForm.reset();
        setStatus(elements.loginStatus, "");
        show("login");
      });

      elements.redirectUrlInput.addEventListener("input", renderTargetPreview);

      elements.copyCurrentButton.addEventListener("click", async () => {
        const url = elements.currentUrl.textContent.trim();
        if (!url || url === "No active redirect found.") {
          return;
        }

        try {
          await navigator.clipboard.writeText(url);
          setStatus(elements.sessionStatus, "Current URL copied.", "ok");
        } catch {
          setStatus(elements.sessionStatus, "Could not copy URL from this browser.", "error");
        }
      });

      renderExistingSession();
    </script>
  </body>
</html>
